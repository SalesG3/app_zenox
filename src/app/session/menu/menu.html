<section class="session-component">
    <div class="menu-component">
        <div class="menu-header">

            <div class="menu-img">
                <i class="fa-solid fa-compass-drafting"></i>
            </div>

            <div class="menu-title">
                Zeno-X MEI
            </div>
        </div>

        <div class="menu-routes">
            <a class="folder-header" (click)="openComponent(moduleWorkspace[0])" skipLocationChange>
                <i class="fa-solid fa-chart-column folder-icon"></i>
                <strong class="folder-label">Dashboard</strong>
            </a>

            <div class="folder-container" *ngFor="let f of menuEngine">

                <div class="folder-header" (click)="openFolder(f)">
                    <i [class]="f.icon" class="folder-icon"></i>
                    <strong class="folder-label">{{ f.folder }}</strong>
                </div>

                <div class="folder-itens" *ngIf="f.open">
                    <a *ngFor="let i of f.itens"
                    (click)="openComponent(i)"
                    class="folder-item"
                    routerLinkActive="active-link"
                    skipLocationChange
                    >
                        <i [class]="i.icon" class="item-icon"></i>
                        <span class="item-label">{{ i.label }}</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="router-component">
        <div class="router-box">

            <div class="router-header">
                <div class="router-info">
                    <span class="router-entidade">
                        {{ NM_ENTIDADE }}
                    </span>
                    
                    <br>
                    
                    <span class="router-usuario">
                        Usuário: {{ NM_USUARIO }} | Competência: {{ meses[ID_MES] }}/{{ ID_ANO }} | Versão: {{ VERSION }}
                    </span>
                </div>
            </div>

            <div class="router-workspace">
                <button
                *ngFor="let i of engineWorkspace"
                (click)="activeWorspace = i.route"
                [class.btn-active]="activeWorspace == i.route"
                class="btn-workspace"
                >
                    <span>
                        {{ i.label }}
                    </span>
                    <i class="fa-solid fa-xmark btn-close" (click)="closeComponent(i)"></i>
                </button>
            </div>
        </div>

        <div class="router-outlet">
            <ng-container *ngFor="let i of engineWorkspace">
                <div [hidden]="activeWorspace !== i.route">
                    <ng-container *ngComponentOutlet="i.component"></ng-container>
                </div>
            </ng-container>
        </div>
    </div>
</section>
