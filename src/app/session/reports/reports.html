<section class="component">
    <div class="comp-header">
        <span class="comp-title">
            {{ title }}
        </span>
    </div>
    
    <div class="container">
        <label for="ID_RELATORIO">
            Selecione o relatório
        </label>
    
        <select
        name="ID_RELATORIO"
        id="ID_RELATORIO"
        [(ngModel)]="ID_RELATORIO"
        >
            <option value="" hidden></option>
            <option *ngFor="let i of dataReports" [value]="i.ID">{{ i.DS }}</option>
        </select>    
    </div>

    <div *ngFor="let r of dataReports">
        <div class="container" *ngIf="r.ID == ID_RELATORIO">
            <div class="filter-input" *ngFor="let i of r.filters">
                <label [for]="i.field">
                    {{ i.label }}
                </label>

                <app-formgroup
                [i]="i" 
                [dataRow]="dataRow"
                [dataConsult]="false"
                [dataLookups]="dataLookups"
                (onLookupFocus)="lookup($event)"
                ></app-formgroup>
            </div>
        </div>
    </div>

    <div class="comp-tools">
        <button
        class="btn-crud"
        [disabled]="!ID_RELATORIO"
        (click)="emitReport()"
        >
            Emitir
        </button>

        <button
        class="btn-crud"
        [disabled]="!ID_RELATORIO"
        >
            Limpar
        </button>
    </div>
</section>
