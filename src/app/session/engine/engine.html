<section class="component">
    <div class="comp-header">
        <span class="comp-title">
            {{ compTitle }}
        </span>
    </div>

    <div class="comp-tools" *ngIf="!dataScreen || dataConsult">
        <button
        class="btn-crud"
        (click)="btnIncluir()"
        >
            <i class="fa-solid fa-square-plus"></i>
            Incluir
        </button>
        
        <button
        class="btn-crud"
        (click)="btnAlterar()"
        [disabled]="!dataRow[dataKey]"
        >
            <i class="fa-solid fa-square-pen"></i>
            Alterar
        </button>

        <button
        class="btn-crud"
        (click)="btnExcluir()"
        [disabled]="!dataRow[dataKey]"
        >
            <i class="fa-solid fa-square-minus"></i>
            Excluir
        </button>

        <button
        class="btn-crud"
        (click)="dataConsult ? btnCancelar() : btnConsultar()"
        [disabled]="!dataRow[dataKey]"
        >
            <i class="fa-solid fa-square-caret-down"></i>
            {{ dataConsult ? "Voltar" : "Consultar"}}
        </button>
    </div>

    <div class="comp-tools" *ngIf="dataScreen && !dataConsult">

        <button
        class="btn-crud"
        (click)="btnSalvar()"
        [disabled]="ngdataForm?.invalid || subScreen"

        >
            <i class="fa-solid fa-floppy-disk"></i>
            {{ dataUpdate ? "Alterar" : "Salvar"}}
        </button>

        <button
        class="btn-crud"
        (click)="btnCancelar()"
        >
            <i class="fa-solid fa-delete-left"></i>
            Cancelar
        </button>
    </div>

    <div class="comp-search" *ngIf="!dataScreen">

        <div class="input-search">
            <label for="DS_PESQUISA">
                Pesquisa:
            </label>
            
            <input
            type="search"
            name="DS_PESQUISA"
            id="DS_PESQUISA"
            [(ngModel)]="dataSearch.DS_PESQUISA"
            >
        </div>

        <button
        class="btn-crud"
        (click)="btnBuscar()"
        >
            Buscar
        </button>

        <button
        class="btn-crud"
        (click)="btnFiltrar()"

        >
            Filtrar
        </button>
    
    </div>

    <div class="container-table" *ngIf="!dataScreen">

        <table class="dataGrid">
            <thead>
                <tr>
                    <th *ngFor="let i of columnsGrid" [style.width.%]="i.width">
                        {{i.name}}
                    </th>
                </tr>
            </thead>
            <tbody>
                <tr
                *ngFor="let item of dataGrid" id="item[dataKey]"
                (click)="dataRow[dataKey] = item[dataKey]"
                [ngClass]="{'selected' : dataRow[dataKey] === item[dataKey]}"
                >
                    <td
                    *ngFor="let c of columnsGrid"
                    [ngSwitch]="c.type"
                    [style.text-align]="c.type === 'currency' ? 'right' : 'left'"
                    >

                        <ng-container *ngSwitchCase="'lookup'">
                            {{ gridLookup(item[c.field], c.table || '') }}
                        </ng-container>

                        <ng-container *ngSwitchCase="'select'">
                            {{ c.options?.[item[c.field]] }}
                        </ng-container>

                        <ng-container *ngSwitchCase="'sn_ativo'">
                            {{ item[c.field] == 1 ? "Sim" : "Não" }}
                        </ng-container>
                    
                        <ng-container *ngSwitchCase="'date'">
                            {{ item[c.field] | date:'dd/MM/yyyy' }}
                        </ng-container>

                        <ng-container *ngSwitchCase="'currency'">
                            {{ item[c.field] | number:'1.2-2':'pt-BR' }}
                        </ng-container>

                        <ng-container *ngSwitchDefault>
                            {{item[c.field]}}
                        </ng-container>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="container-form" *ngIf="dataScreen">
        <form #ngdataForm="ngForm" class="dataForm">
            <div class="form-group" *ngFor="let i of dataForm.master" [style.width.%]="i.width">

                <div class="input-group" [ngSwitch]="i.type"  [style.height.rem]="i.height">

                    <label [for]="i.field">
                        {{ i.label }}
                        <span *ngIf="i.required" [style.color]="'red'">*</span>
                    </label>
                    
                    <app-formgroup
                    [i]="i" 
                    [dataRow]="dataRow"
                    [dataConsult]="dataConsult"
                    [dataLookups]="dataLookups"
                    (onLookupFocus)="lookup($event)"
                    (onAutocomplete)="autocomplete($event)"
                    (onConsultFile)="consultFile()"
                    ></app-formgroup>

                    <ng-container *ngSwitchCase="'subComponent'" >
                        <app-subengine
                        [subConsult]="dataConsult"
                        [table]="i.field"
                        [dataSub]="dataSub[i.field]"
                        [subForm]="subComponent[i.field].subForm"
                        [subColumns]="subComponent[i.field].subColumns"                        
                        [(subGrid)]="subGrids[i.field]"
                        (subGridChange)="calcInput()"
                        (subScreenChange)="screenSubs($event)"
                        [supKey]="dataKey"
                        [subKey]="subComponent[i.field].subKey"
                        >
                    
                        </app-subengine>
                    </ng-container>
                </div>
            </div>

            <div class="tabs-header" *ngIf="dataForm.tabs.length"> 
                <button
                class="btn-tabs"
                [class.btn-active]="activeTab == i.id"
                *ngFor="let i of dataForm.tabs"
                (click)="activeTab = i.id"
                >
                    {{ i.label }}
                </button>
            </div>

            <div class="tabs-body">
                <div class="dataForm" *ngFor="let aba of dataForm.tabs">
                    <div *ngFor="let i of aba.abaForm" [hidden]="activeTab !== aba.id">

                        <div class="input-group" [ngSwitch]="i.type" [style.width.%]="i.width" [style.height.rem]="i.height">
                            <label [for]="i.field">
                                {{ i.label }}
                                <span *ngIf="i.required" [style.color]="'red'">*</span>
                            </label>

                            <app-formgroup
                            [i]="i" 
                            [dataRow]="dataRow"
                            [dataConsult]="dataConsult"
                            [dataLookups]="dataLookups"
                            (onLookupFocus)="lookup($event)"
                            (onAutocomplete)="autocomplete($event)"
                            (onConsultFile)="consultFile()"
                            ></app-formgroup>

                            <ng-container *ngSwitchCase="'subComponent'" >
                                <app-subengine
                                [subConsult]="dataConsult"
                                [table]="i.field"
                                [dataSub]="dataSub[i.field]"
                                [subForm]="subComponent[i.field].subForm"
                                [subColumns]="subComponent[i.field].subColumns"                        
                                [(subGrid)]="subGrids[i.field]"
                                (subGridChange)="calcInput()"
                                (subScreenChange)="screenSubs($event)"
                                [supKey]="dataKey"
                                [subKey]="subComponent[i.field].subKey"
                                ></app-subengine>
                            </ng-container>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
</section>

<dialog class="modalFiltro" #modalFiltro>
    <div class="modalHeader">
        <span class="modalTitle">
            Filtro Avançado
        </span>
    </div>

    <div class="modalBody">
        <div *ngFor="let i of formFilter">
            <div class="input-group">

                <label [for]="i.field">
                    {{ i.label }}
                </label>

                <app-formgroup
                [i]="i"
                [dataRow]="dataSearch.filters" 
                [dataConsult]="false"
                [dataLookups]="dataLookups"
                (onLookupFocus)="lookup($event)"
                ></app-formgroup>

            </div>
        </div>
    </div>

    <div class="modalTools">
        <button
        class="btn-crud"
        (click)="btnBuscar()"
        >

            Filtrar
        </button>
    </div>
</dialog>
